apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service-node
  labels:
    app: product-service-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service-node
  template:
    metadata:
      labels:
        app: product-service-node
    spec:
      containers:
        - name: product-service
          image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          ports:
            - containerPort: 3006
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3006"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: product-db
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: product-db
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: product-db
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-db
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: product-db
                  key: name
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: product-rabbitmq
                  key: url
            - name: CORS_ORIGIN
              value: "https://tudominio.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 10
